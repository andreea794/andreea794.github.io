name: Sync Design Tokens

# Triggers whenever a push to main updates the Tokens Studio single-file export.
on:
  push:
    branches: [main]
    paths:
      - 'tokens.json'

# Required for peter-evans/create-pull-request to open / update the PR
permissions:
  contents: write
  pull-requests: write

jobs:
  sync-tokens:
    name: Build tokens → open PR
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Node / Yarn setup ─────────────────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      # ── 3. Run Style Dictionary ───────────────────────────────────────────────
      - name: Build design tokens
        run: yarn build:tokens

      # ── 4. Open / update the PR ───────────────────────────────────────────────
      # If src/styles/tokens/ has no diff, the action exits silently (no PR).
      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          # Only stage generated token files — never the source JSON
          add-paths: src/styles/tokens/**
          commit-message: 'chore(tokens): regenerate from updated Figma token JSON'
          branch: chore/sync-design-tokens
          delete-branch: true
          title: '🎨 Sync design tokens from Figma'
          body: |
            ## 🎨 Design Token Sync

            A push to `tokens.json` was detected (Tokens Studio → GitHub sync).
            This PR contains the regenerated Style Dictionary output.

            ### Changed files
            | File | Contents |
            |------|----------|
            | `src/styles/tokens/tokens.css` | All tokens as CSS custom properties (`--ds-*`) |
            | `src/styles/tokens/_colors.scss` | Color SCSS variables |
            | `src/styles/tokens/_typography.scss` | Typography SCSS variables |
            | `src/styles/tokens/_spacing.scss` | Spacing SCSS variables |
            | `src/styles/tokens/_radius.scss` | Border-radius SCSS variables |
            | `src/styles/tokens/tokens.js` | All tokens as named ES-module exports |

            ### Review checklist
            - [ ] Color values (hex / rgba) look correct
            - [ ] Typography scale is as expected
            - [ ] Spacing step values are correct
            - [ ] No unexpected regressions in the diff

            ---
            *Auto-generated by [Style Dictionary](https://styledictionary.com) via
            [Tokens Studio](https://tokens.studio) → GitHub Actions.*
